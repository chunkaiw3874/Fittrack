<!DOCTYPE html>

<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0891b2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FitTrack">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<title>FitTrack Test</title>
<style>
body {
    margin: 0;
    background: #020617;
    color: white;
    font-family: -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
}
h1 { color: #06b6d4; font-size: 36px; margin-bottom: 20px; }
p { font-size: 18px; margin: 10px 0; }
.success { color: #10b981; font-size: 24px; }
.button {
    display: inline-block;
    margin-top: 30px;
    padding: 15px 30px;
    background: linear-gradient(to right, #06b6d4, #3b82f6);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
}
</style>
</head>
<body>
<div>
<h1>FitTrack</h1>
<p class="success">✅ 部署成功！</p>
<p>Kevin 的健身計畫</p>
<p style="color: #64748b; margin-top: 30px;">這是測試版本</p>
<p style="color: #64748b;">如果你看到這個，代表環境完全正常</p>
<a href="#" class="button" onclick="alert('成功！可以加入主畫面了！'); return false;">測試按鈕</a>
</div>

<script>
// 卸載任何舊的 service worker
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(let registration of registrations) {
            registration.unregister();
            console.log('Unregistered SW:', registration);
        }
    });
}

// 清除所有 cache
if ('caches' in window) {
    caches.keys().then(function(names) {
        for (let name of names) {
            caches.delete(name);
            console.log('Deleted cache:', name);
        }
    });
}
</script>

</body>
</html>
