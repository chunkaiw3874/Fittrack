* { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; box-sizing: border-box; }
html, body {

    position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;

<div id="root"></div>

<script>
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
        for(var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
        }
    });
}
if ('caches' in window) {
    caches.keys().then(function(names) {
        for(var i = 0; i < names.length; i++) {
            caches.delete(names[i]);
        }
    });
}

function hideLoading() {
    var loading = document.getElementById('loading');
    if (loading) {
        loading.style.opacity = '0';
        setTimeout(function() { 
            if (loading.parentNode) loading.parentNode.removeChild(loading);
        }, 300);
    }
}

setTimeout(function() {
    var loading = document.getElementById('loading');
    if (loading) {
        var status = document.getElementById('loading-status');
        if (status) status.innerText = '稍候片刻...';
    }
}, 3000);

setTimeout(hideLoading, 10000);

window.addEventListener('load', function() {
    setTimeout(hideLoading, 800);
});

var checkInterval = setInterval(function() {
    var root = document.getElementById('root');
    if (root && root.children.length > 0) {
        clearInterval(checkInterval);
        hideLoading();
    }
}, 200);
</script>

// 安全的本地儲存（含錯誤處理）
// ============================================
const safeStorage = {
    get: (key) => {
        try {
            const item = localStorage.getItem(key);
            return item ? JSON.parse(item) : null;
        } catch (e) {
            console.error('讀取資料失敗:', e);
            return null;
        }
    },
    set: (key, value) => {
        try {
            localStorage.setItem(key, JSON.stringify(value));
            return true;
        } catch (e) {
            console.error('儲存資料失敗:', e);
            // 儲存空間滿了或被禁用
            if (e.name === 'QuotaExceededError') {
                alert('儲存空間已滿，請清理舊資料');
            }
            return false;
        }
    },
    remove: (key) => {
        try {
            localStorage.removeItem(key);
            return true;
        } catch (e) {
            return false;
        }
    }
};

// ============================================
// 主應用程式
// ============================================
function FitnessApp() {
    const [currentPage, setCurrentPage] = useState('home');
    const [mainTab, setMainTab] = useState('workout'); // 'workout' or 'food'
    const [userLocation, setUserLocation] = useState(null);
    // 動作搜尋頁狀態
    const [searchQuery, setSearchQuery] = useState('');
    const [filterMuscles, setFilterMuscles] = useState([]);
    const [filterEquipment, setFilterEquipment] = useState([]);
    const [filterDifficulty, setFilterDifficulty] = useState([]);
    const [favoriteExercises, setFavoriteExercises] = useState([]);
    const [selectedDay, setSelectedDay] = useState(null);
    const [duration, setDuration] = useState('standard');
    const [customWorkouts, setCustomWorkouts] = useState({});
    const [progress, setProgress] = useState({});
    
    const [currentExerciseIdx, setCurrentExerciseIdx] = useState(0);
    const [completedSets, setCompletedSets] = useState([]);
    const [timerSeconds, setTimerSeconds] = useState(0);
    const [isTimerRunning, setIsTimerRunning] = useState(false);
    // 自動計時模式新增的 state
    const [autoMode, setAutoMode] = useState('idle'); // idle, exercising, resting, preparing, done
    const [autoSecondsLeft, setAutoSecondsLeft] = useState(0);
    const [soundEnabled, setSoundEnabled] = useState(true);
    const [vibrationEnabled, setVibrationEnabled] = useState(false);
    
    const [showSwapModal, setShowSwapModal] = useState(null);
    const [showDetailModal, setShowDetailModal] = useState(null);
    const [filterRegion, setFilterRegion] = useState('all');
    const [showSettings, setShowSettings] = useState(false);
    const [showSaveToast, setShowSaveToast] = useState(false);
    const [showInputModal, setShowInputModal] = useState(null);
    const [inputValue, setInputValue] = useState('');

    // 載入儲存的資料
    useEffect(() => {
        const settings = safeStorage.get('fittrack_settings');
        if (settings?.duration) {
            var d = settings.duration;
            if (typeof d === 'number') {
                if (d <= 20) d = 'quick';
                else if (d <= 35) d = 'standard';
                else d = 'deep';
            }
            if (d !== 'quick' && d !== 'standard' && d !== 'deep') {
                d = 'standard';
            }
            setDuration(d);
        }
        if (settings?.soundEnabled !== undefined) setSoundEnabled(settings.soundEnabled);
        if (settings?.vibrationEnabled !== undefined) setVibrationEnabled(settings.vibrationEnabled);
        var favs = safeStorage.get('fittrack_favorites');
        if (favs && Array.isArray(favs)) setFavoriteExercises(favs);
        
        const workouts = safeStorage.get('fittrack_customWorkouts');
        if (workouts) setCustomWorkouts(workouts);
        
        const prog = safeStorage.get('fittrack_progress');
        if (prog) setProgress(prog);
    }, []);

    // 計時器（手動模式）
    useEffect(() => {
        if (!isTimerRunning) return;
        const interval = setInterval(() => setTimerSeconds(s => s + 1), 1000);
        return () => clearInterval(interval);
    }, [isTimerRunning]);
    
    // 自動倒數計時器（用 functional updater 確保讀到最新狀態）
    useEffect(() => {
        if (autoMode === 'idle' || autoMode === 'done' || autoMode === 'paused') return;
        if (autoSecondsLeft <= 0) return;
        if (!selectedDay) return;
        
        // 在 effect 內計算當下的 exercises（不依賴外部）
        const config = durationConfigs[duration];
        const baseExercises = customWorkouts[selectedDay] || (defaultTemplates[selectedDay] && defaultTemplates[selectedDay].exercises) || [];
        const currentExercises = baseExercises.slice(0, config.exerciseCount);
        const currentExName = currentExercises[currentExerciseIdx];
        const currentEx = exerciseDB[currentExName];
        
        if (!currentEx) return;
        
        const interval = setInterval(() => {
            setAutoSecondsLeft(function(prevSec) {
                var next = prevSec - 1;
                
                // 倒數最後 3 秒：滴滴聲
                if (next === 3 || next === 2 || next === 1) {
                    notify('tick');
                }
                
                if (next > 0) {
                    return next;
                }
                
                // 倒數歸零，切換階段
                setAutoMode(function(currentMode) {
                    if (currentMode === 'exercising') {
                        notify('finish');
                        
                        setCompletedSets(function(prevCompletedSets) {
                            var newSets = prevCompletedSets.slice();
                            var doneSec = parseSeconds(currentEx.defaultReps);
                            newSets[currentExerciseIdx] = (newSets[currentExerciseIdx] || []).concat([doneSec]);
                            
                            setProgress(function(prevProgress) {
                                var today = new Date().toISOString().split('T')[0];
                                var newProgress = Object.assign({}, prevProgress);
                                if (!newProgress[today]) newProgress[today] = {};
                                newProgress[today] = Object.assign({}, newProgress[today]);
                                newProgress[today][selectedDay] = newSets;
                                safeStorage.set('fittrack_progress', newProgress);
                                return newProgress;
                            });
                            
                            // 檢查是否完成所有組數
                            var totalSets = config.setsPerExercise;
                            if (newSets[currentExerciseIdx].length >= totalSets) {
                                setTimeout(function() { 
                                    setAutoMode('done'); 
                                    setAutoSecondsLeft(0);
                                }, 0);
                            } else {
                                // 進入休息
                                var restTime = Math.round(currentEx.defaultRest * config.restMultiplier);
                                setTimeout(function() { setAutoSecondsLeft(restTime); }, 0);
                            }
                            
                            return newSets;
                        });
                        
                        return 'resting';
                    } else if (currentMode === 'resting') {
                        notify('rest_done');
                        setTimeout(function() { setAutoSecondsLeft(3); }, 0);
                        return 'preparing';
                    } else if (currentMode === 'preparing') {
                        var exerciseTime = parseSeconds(currentEx.defaultReps);
                        setTimeout(function() { setAutoSecondsLeft(exerciseTime); }, 0);
                        return 'exercising';
                    }
                    return currentMode;
                });
                
                return prevSec;
            });
        }, 1000);
        
        return () => clearInterval(interval);
    }, [autoMode, currentExerciseIdx, selectedDay, duration, customWorkouts]);
    
    // 啟動自動模式
    const startAutoMode = () => {
        // inline 計算當下的 exercises（不依賴外部 scope）
        if (!selectedDay) return;
        const config = durationConfigs[duration];
        const baseExercises = customWorkouts[selectedDay] || (defaultTemplates[selectedDay] && defaultTemplates[selectedDay].exercises) || [];
        const currentExercises = baseExercises.slice(0, config.exerciseCount);
        const currentExName = currentExercises[currentExerciseIdx];
        const ex = exerciseDB[currentExName];
        if (!ex) return;
        var seconds = parseSeconds(ex.defaultReps);
        setAutoSecondsLeft(seconds);
        setAutoMode('exercising');
    };
    
    // 暫停 / 繼續自動模式
    const togglePauseAuto = () => {
        if (autoMode === 'paused') {
            // 繼續：根據儲存的狀態回去
            // 簡化：暫停時就停在當前秒數，按繼續就繼續
        }
    };
    
    // 跳過當前階段
    const skipCurrentPhase = () => {
        setAutoSecondsLeft(1); // 強制觸發階段切換
    };
    
    // 完全停止自動模式
    const stopAutoMode = () => {
        setAutoMode('idle');
        setAutoSecondsLeft(0);
    };

    const saveSettings = (newLevel) => {
        setDuration(newLevel);
        var existing = safeStorage.get('fittrack_settings') || {};
        existing.duration = newLevel;
        safeStorage.set('fittrack_settings', existing);
        showToast();
    };
    
    const saveSoundSetting = (enabled) => {
        setSoundEnabled(enabled);
        var existing = safeStorage.get('fittrack_settings') || {};
        existing.soundEnabled = enabled;
        safeStorage.set('fittrack_settings', existing);
    };
    
    const saveVibrationSetting = (enabled) => {
        setVibrationEnabled(enabled);
        var existing = safeStorage.get('fittrack_settings') || {};
        existing.vibrationEnabled = enabled;
        safeStorage.set('fittrack_settings', existing);
    };
    
    // 播放聲音
    const playBeep = (frequency, duration) => {
        if (!soundEnabled) return;
        try {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var oscillator = ctx.createOscillator();
            var gainNode = ctx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(ctx.destination);
            oscillator.frequency.value = frequency || 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.3, ctx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + (duration || 0.2));
            oscillator.start(ctx.currentTime);
            oscillator.stop(ctx.currentTime + (duration || 0.2));
        } catch (e) {}
    };
    
    // 震動
    const doVibrate = (pattern) => {
        if (!vibrationEnabled) return;
        if (navigator.vibrate) {
            navigator.vibrate(pattern || 200);
        }
    };
    
    // 通知（聲音 + 震動）
    const notify = (type) => {
        if (type === 'finish') {
            // 動作完成：高音雙響
            playBeep(880, 0.15);
            setTimeout(function() { playBeep(1100, 0.2); }, 200);
            doVibrate([200, 100, 200]);
        } else if (type === 'rest_done') {
            // 休息結束：低音三響
            playBeep(600, 0.15);
            setTimeout(function() { playBeep(600, 0.15); }, 200);
            setTimeout(function() { playBeep(900, 0.3); }, 400);
            doVibrate([100, 100, 100, 100, 200]);
        } else if (type === 'tick') {
            // 倒數最後3秒
            playBeep(440, 0.1);
            doVibrate(50);
        }
    };
    
    // 判斷是否為秒數動作
    const isTimedExercise = (reps) => {
        if (!reps) return false;
        return reps.toString().includes('秒');
    };
    
    // 從次數字串中取得秒數（如 "30秒" → 30, "30秒/邊" → 30, "30-60秒" → 30）
    const parseSeconds = (reps) => {
        if (!reps) return 30;
        var match = reps.toString().match(/(\d+)/);
        return match ? parseInt(match[1]) : 30;

                ) : React.createElement('div', { className: 'space-y-3' },
                    React.createElement('p', { className: 'text-xs text-slate-400 uppercase tracking-widest px-2' }, '訓練歷史'),
                    dates.map(date => {
                        const dayWorkouts = progress[date] || {};
                        return React.createElement('div', { key: date, className: 'bg-slate-900/50 border border-slate-800 rounded-2xl p-4' },
                            React.createElement('p', { className: 'font-semibold text-white mb-2' },
                                new Date(date).toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' })
                            ),
                            Object.entries(dayWorkouts).map(([day, sets]) => {
                                const template = defaultTemplates[day];
                                const exercises = customWorkouts[day] || template?.exercises || [];
                                return React.createElement('div', { key: day, className: 'bg-slate-800/50 rounded-xl p-3 mt-2' },
                                    React.createElement('p', { className: 'text-sm font-semibold text-cyan-300 flex items-center gap-2 mb-2' },
                                        React.createElement('span', { className: 'text-lg' }, template?.icon),
                                        template?.name
                                    ),
                                    React.createElement('div', { className: 'space-y-1' },
                                        sets.map((reps, idx) => reps.length > 0 && React.createElement('div', {
                                            key: idx,
                                            className: 'flex justify-between text-xs'
                                        },
                                            React.createElement('span', { className: 'text-slate-400' }, exercises[idx]),
                                            React.createElement('span', { className: 'text-emerald-400 font-mono' }, (reps.join(' • ')) + '下')
                                        ))
                                    )
                                );
                            })
                        );
                    })
                ),
                React.createElement('div', { className: 'bg-blue-950/30 border border-blue-700/30 rounded-2xl p-4' },
                    React.createElement('p', { className: 'text-sm font-semibold text-blue-300 mb-2' }, '💾 備份建議'),
                    React.createElement('p', { className: 'text-xs text-slate-300 leading-relaxed' }, '所有數據儲存在你的設備上。建議每月截圖此頁面備份，預防數據遺失。')
                )
            )
        );
    }

    return null;
}

// ============================================
// 啟動應用
// ============================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(FitnessApp));
</script>

</body>
